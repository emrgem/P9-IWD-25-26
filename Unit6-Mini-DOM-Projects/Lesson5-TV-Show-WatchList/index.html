<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TV Watchlist - Day 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📺 TV Show Watchlist</h1>
        
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search for a TV show...">
            <button id="search-btn">Search 🔍</button>
        </div>

        <div id="results" class="results-grid"></div>
        <!-- Watchlist Section -->
         <div class="watchlist-header">
         <h2>⭐ My Watchlist</h2>
         <button id="clear-all-btn" class="clear-btn">Clear All 🗑️</button>
         </div>
         <div id="watchlist-count" class="watchlist-count"></div>
         <div id="watchlist-container" class="watchlist-grid"></div>
    </div>

    <script src="js/dom.js"></script>
    <script src="js/api.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
